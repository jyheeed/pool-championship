services:
  mongodb:
    image: mongo:7
    container_name: pool-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pool-web
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AUTH_COOKIE_SECURE: "false"
      MONGODB_URI: mongodb://mongodb:27017/pool-championship
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://' + process.env.HOSTNAME + ':3000/api/health/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
